name: Daily public content freshness

on:
  schedule:
    - cron: '10 7 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/build-index.mjs
      - run: node scripts/check-freshness.mjs --max-age-days=1
